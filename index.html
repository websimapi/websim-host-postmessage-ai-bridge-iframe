<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Host — PostMessage AI Bridge (iframe)</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="importmap">
    {
      "imports": {
        "nanoid": "https://cdn.jsdelivr.net/npm/nanoid/nanoid.js"
      }
    }
  </script>
</head>
<body>
  <main class="container">
    <h1>Host — AI Bridge iframe</h1>
    <p class="hint">This page embeds the AI Bridge plugin-page from websim.com and exchanges structured JSON via postMessage. Use the controls to send test generate requests to the iframe.</p>

    <div class="controls">
      <div class="row">
        <label>Type
          <select id="testType">
            <option value="text">Text</option>
            <option value="image">Image</option>
            <option value="tts">TTS</option>
          </select>
        </label>
        <label>Prompt
          <input id="testPrompt" value="Write a short friendly greeting." />
        </label>
        <button id="sendTest">Send to iframe</button>
        <button id="focusIframe">Focus iframe</button>
      </div>
      <p class="small">Messages are shown in the log below. The iframe origin is websim.com.</p>
    </div>

    <section class="log" id="log" aria-live="polite"></section>

    <div class="iframe-wrap">
      <iframe id="aiIframe" src="https://websim.com/@api/plugin-page" title="AI Bridge iframe"></iframe>
    </div>
  </main>

  <script type="module" src="main.js"></script>

</body>
</html>
